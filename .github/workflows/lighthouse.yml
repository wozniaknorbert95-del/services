name: Lighthouse CI

on:
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx serve dist -l 3000 &
      - run: sleep 3 && LIGHTHOUSE_URL=http://localhost:3000 npm run lighthouse:ci
        continue-on-error: true
