<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Self-service configurator journey  seven steps plus checkout</title>
  <desc id="desc">Client journey map showing welcome, seven configuration categories with progress bar and sticky cart, then open pricing and checkout.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e8a33d"/>
    </marker>
    <style>
      .bg { fill: #0e0c0a; }
      .box { fill: #15120e; stroke: #2a241c; stroke-width: 2; }
      .step { fill: #1c1813; stroke: #3a3226; stroke-width: 1.5; }
      .checkout { fill: #e8a33d; fill-opacity: 0.12; stroke: #e8a33d; stroke-width: 2; }
      .text { fill: #e9e2d4; font-family: 'JetBrains Mono', Consolas, monospace; font-size: 14px; font-weight: 700; }
      .sub { fill: #9a907e; font-family: 'JetBrains Mono', Consolas, monospace; font-size: 11px; }
      .num { fill: #e8a33d; font-family: 'JetBrains Mono', Consolas, monospace; font-size: 12px; font-weight: 700; }
      .bar { fill: #2a241c; }
      .barfill { fill: #e8a33d; }
      .cart { fill: #15120e; stroke: #e8a33d; stroke-width: 1.5; stroke-dasharray: 4 3; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="900"/>
  <text x="600" y="44" class="text" text-anchor="middle" font-size="20">Self-service configurator  what your client sees</text>
  <text x="600" y="72" class="sub" text-anchor="middle">7 configuration steps · progress bar · sticky cart · open pricing at checkout</text>

  <!-- Progress + cart chrome -->
  <rect x="80" y="100" width="1040" height="12" rx="6" class="bar"/>
  <rect x="80" y="100" width="520" height="12" rx="6" class="barfill"/>
  <text x="80" y="132" class="sub">Progress bar  visible on every step</text>

  <rect x="900" y="118" width="220" height="48" rx="4" class="cart"/>
  <text x="1010" y="142" class="text" text-anchor="middle" font-size="12">Sticky cart</text>
  <text x="1010" y="158" class="sub" text-anchor="middle">running total · always visible</text>

  <!-- Welcome -->
  <rect x="80" y="190" width="200" height="56" rx="4" class="box"/>
  <text x="180" y="216" class="text" text-anchor="middle" font-size="13">Welcome</text>
  <text x="180" y="234" class="sub" text-anchor="middle">orient · scope</text>

  <line x1="280" y1="218" x2="320" y2="218" stroke="#e8a33d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 7 steps grid -->
  <text x="80" y="280" class="num">7 CONFIGURATION STEPS</text>

  <rect x="80" y="300" width="240" height="72" rx="4" class="step"/>
  <text x="92" y="322" class="num">01</text>
  <text x="120" y="322" class="text" font-size="13">Foundation</text>
  <text x="120" y="342" class="sub">core package choices</text>
  <text x="120" y="358" class="sub">build-your-own base</text>

  <rect x="340" y="300" width="240" height="72" rx="4" class="step"/>
  <text x="352" y="322" class="num">02</text>
  <text x="380" y="322" class="text" font-size="13">Vehicle</text>
  <text x="380" y="342" class="sub">mobile branding options</text>

  <rect x="600" y="300" width="240" height="72" rx="4" class="step"/>
  <text x="612" y="322" class="num">03</text>
  <text x="640" y="322" class="text" font-size="13">Workwear</text>
  <text x="640" y="342" class="sub">clothing branding</text>

  <rect x="860" y="300" width="260" height="72" rx="4" class="step"/>
  <text x="872" y="322" class="num">04</text>
  <text x="900" y="322" class="text" font-size="13">First impression</text>
  <text x="900" y="342" class="sub">print · physical presence</text>

  <line x1="200" y1="372" x2="200" y2="400" stroke="#e8a33d" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="460" y1="372" x2="460" y2="400" stroke="#e8a33d" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="720" y1="372" x2="720" y2="400" stroke="#e8a33d" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="990" y1="372" x2="990" y2="400" stroke="#e8a33d" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="80" y="410" width="240" height="72" rx="4" class="step"/>
  <text x="92" y="432" class="num">05</text>
  <text x="120" y="432" class="text" font-size="13">Visibility</text>
  <text x="120" y="452" class="sub">on-site presence</text>

  <rect x="340" y="410" width="240" height="72" rx="4" class="step"/>
  <text x="352" y="432" class="num">06</text>
  <text x="380" y="432" class="text" font-size="13">Tools</text>
  <text x="380" y="452" class="sub">equipment branding</text>

  <rect x="600" y="410" width="240" height="72" rx="4" class="step"/>
  <text x="612" y="432" class="num">07</text>
  <text x="640" y="432" class="text" font-size="13">Premium</text>
  <text x="640" y="452" class="sub">finishing touches</text>

  <line x1="720" y1="482" x2="720" y2="530" stroke="#e8a33d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Checkout -->
  <rect x="420" y="540" width="360" height="88" rx="4" class="checkout"/>
  <text x="600" y="572" class="text" text-anchor="middle" font-size="15">Summary &amp; checkout</text>
  <text x="600" y="594" class="sub" text-anchor="middle">open pricing · upload assets · pay or book</text>
  <text x="600" y="612" class="sub" text-anchor="middle">no phone call required to get a number</text>

  <!-- Backend -->
  <line x1="600" y1="628" x2="600" y2="670" stroke="#e8a33d" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="300" y="680" width="600" height="72" rx="4" class="box"/>
  <text x="600" y="708" class="text" text-anchor="middle" font-size="14">Your inbox / CRM / sheet</text>
  <text x="600" y="730" class="sub" text-anchor="middle">structured lead · clean data · no back-and-forth</text>

  <text x="600" y="820" class="sub" text-anchor="middle">Live production wizard in owner ecosystem · step names verified against source · no conversion rates claimed</text>
  <text x="600" y="848" class="sub" text-anchor="middle">Norbert  AI Systems Architect · Quietforge · services.flexgrafik.nl/book-discovery/</text>
</svg>
