<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Gamified lead funnel - four-tier reward ladder</title>
  <desc id="desc">Visitor registers, plays five acts, unlocks discount and physical purchase bonuses, captures contact, routes to self-service wizard.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6fae6f"/>
    </marker>
    <style>
      .bg { fill: #0e0c0a; }
      .box { fill: #15120e; stroke: #2a241c; stroke-width: 2; }
      .money { fill: #6fae6f; }
      .text { fill: #e9e2d4; font-family: 'JetBrains Mono', Consolas, monospace; font-size: 16px; font-weight: 700; }
      .sub { fill: #9a907e; font-family: 'JetBrains Mono', Consolas, monospace; font-size: 12px; }
      .gate { fill: #6fae6f; fill-opacity: 0.12; stroke: #6fae6f; stroke-width: 2; stroke-dasharray: 6 4; }
      .dashed { stroke: #9a907e; stroke-width: 2; stroke-dasharray: 8 5; fill: none; }
      .tier { fill: #15120e; stroke: #6fae6f; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="820"/>
  <text x="600" y="40" class="text" text-anchor="middle" font-size="22">Gamified lead system - acquisition funnel</text>
  <text x="600" y="66" class="sub" text-anchor="middle">register / play / reward ladder / capture / wizard handoff</text>

  <rect x="40" y="100" width="140" height="64" rx="4" class="box"/>
  <text x="110" y="128" class="text" text-anchor="middle" font-size="13">Visitor</text>
  <text x="110" y="148" class="sub" text-anchor="middle">cold traffic</text>

  <rect x="220" y="100" width="140" height="64" rx="4" class="box"/>
  <text x="290" y="128" class="text" text-anchor="middle" font-size="13">Register</text>
  <text x="290" y="148" class="sub" text-anchor="middle">name + email</text>

  <rect x="400" y="100" width="140" height="64" rx="4" class="box"/>
  <text x="470" y="128" class="text" text-anchor="middle" font-size="13">Play</text>
  <text x="470" y="148" class="sub" text-anchor="middle">5 Canvas acts</text>

  <rect x="580" y="100" width="160" height="64" rx="4" class="box"/>
  <text x="660" y="128" class="text" text-anchor="middle" font-size="13">Reward tiers</text>
  <text x="660" y="148" class="sub" text-anchor="middle">L2-L5 unlock</text>

  <rect x="780" y="100" width="160" height="64" rx="4" class="gate"/>
  <text x="860" y="128" class="text" text-anchor="middle" font-size="13">Capture</text>
  <text x="860" y="148" class="sub" text-anchor="middle">contact earned</text>

  <line x1="180" y1="132" x2="218" y2="132" stroke="#6fae6f" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="132" x2="398" y2="132" stroke="#6fae6f" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="132" x2="578" y2="132" stroke="#6fae6f" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="740" y1="132" x2="778" y2="132" stroke="#6fae6f" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="80" y="210" width="240" height="72" rx="4" class="tier"/>
  <text x="200" y="238" class="money" text-anchor="middle" font-size="15">L2 GAME10</text>
  <text x="200" y="260" class="sub" text-anchor="middle">10% discount</text>

  <rect x="340" y="210" width="240" height="72" rx="4" class="tier"/>
  <text x="460" y="238" class="money" text-anchor="middle" font-size="15">L3 STICKER1</text>
  <text x="460" y="260" class="sub" text-anchor="middle">sticker pack purchase bonus</text>

  <rect x="600" y="210" width="240" height="72" rx="4" class="tier"/>
  <text x="720" y="238" class="money" text-anchor="middle" font-size="15">L4 TSHIRT2</text>
  <text x="720" y="260" class="sub" text-anchor="middle">t-shirt purchase bonus</text>

  <rect x="860" y="210" width="240" height="72" rx="4" class="tier"/>
  <text x="980" y="238" class="money" text-anchor="middle" font-size="15">L5 WINNER</text>
  <text x="980" y="260" class="sub" text-anchor="middle">hoodie purchase bonus</text>

  <line x1="660" y1="164" x2="660" y2="188" stroke="#6fae6f" stroke-width="2"/>
  <line x1="660" y1="188" x2="200" y2="188" stroke="#6fae6f" stroke-width="2"/>
  <line x1="200" y1="188" x2="200" y2="208" stroke="#6fae6f" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="246" x2="338" y2="246" stroke="#6fae6f" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="246" x2="598" y2="246" stroke="#6fae6f" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="840" y1="246" x2="858" y2="246" stroke="#6fae6f" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="400" y="320" width="400" height="72" rx="4" class="box"/>
  <text x="600" y="352" class="text" text-anchor="middle" font-size="14">ZZPackage wizard</text>
  <text x="600" y="374" class="sub" text-anchor="middle">self-service quote + checkout</text>

  <line x1="600" y1="282" x2="600" y2="318" stroke="#6fae6f" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="60" y="320" width="200" height="56" rx="4" class="box"/>
  <text x="160" y="346" class="sub" text-anchor="middle" font-size="12">Game over</text>
  <text x="160" y="364" class="money" text-anchor="middle" font-size="13">GAME10 fallback</text>
  <line x1="260" y1="348" x2="398" y2="348" class="dashed" marker-end="url(#arrow)"/>

  <text x="600" y="430" class="sub" text-anchor="middle" font-size="11">Physical purchase bonuses: min. EUR 199 incl. VAT on ZZPackage activation</text>

  <text x="600" y="470" class="text" text-anchor="middle" font-size="18">Five acts (Canvas)</text>

  <rect x="40" y="490" width="200" height="56" rx="4" class="box"/>
  <text x="140" y="514" class="sub" text-anchor="middle">01 Klusser</text>
  <text x="140" y="532" class="sub" text-anchor="middle" font-size="10">L1 -</text>

  <rect x="260" y="490" width="200" height="56" rx="4" class="box"/>
  <text x="360" y="514" class="sub" text-anchor="middle">02 Reputatie</text>
  <text x="360" y="532" class="money" text-anchor="middle" font-size="10">L2 GAME10</text>

  <rect x="480" y="490" width="240" height="56" rx="4" class="box"/>
  <text x="600" y="514" class="sub" text-anchor="middle">03 Professionalisering</text>
  <text x="600" y="532" class="money" text-anchor="middle" font-size="10">L3 STICKER1</text>

  <rect x="740" y="490" width="200" height="56" rx="4" class="box"/>
  <text x="840" y="514" class="sub" text-anchor="middle">04 Expansie</text>
  <text x="840" y="532" class="money" text-anchor="middle" font-size="10">L4 TSHIRT2</text>

  <rect x="960" y="490" width="200" height="56" rx="4" class="box"/>
  <text x="1060" y="514" class="sub" text-anchor="middle">05 Belasting-Eindbaas</text>
  <text x="1060" y="532" class="money" text-anchor="middle" font-size="10">L5 WINNER</text>

  <rect x="280" y="590" width="640" height="72" rx="4" class="box"/>
  <text x="600" y="620" class="text" text-anchor="middle" font-size="14">Monthly leaderboard</text>
  <text x="600" y="642" class="sub" text-anchor="middle">season prize: magnet board and stickers - separate retention track</text>

  <text x="600" y="710" class="sub" text-anchor="middle">app.flexgrafik.nl / live / custom Canvas engine</text>
</svg>
